<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Glowing Heart</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle, #1a001a, #000);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .container {
      position: relative;
      text-align: center;
    }

    .heart {
      position: relative;
      width: 150px;
      height: 150px;
      background: #ff0040;
      transform: rotate(-45deg);
      animation: beat 1s infinite;
      box-shadow: 0 0 20px #ff0040, 0 0 40px #ff0040, 0 0 60px #ff0040;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 150px;
      height: 150px;
      background: #ff0040;
      border-radius: 50%;
      box-shadow: 0 0 20px #ff0040, 0 0 40px #ff0040, 0 0 60px #ff0040;
    }

    .heart::before {
      top: -75px;
      left: 0;
    }

    .heart::after {
      left: 75px;
      top: 0;
    }

    @keyframes beat {
      0%, 100% {
        transform: rotate(-45deg) scale(1);
      }
      50% {
        transform: rotate(-45deg) scale(1.15);
      }
    }

    .text {
      position: absolute;
      width: 300px;
      top: 200px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 26px;
      font-weight: bold;
      text-shadow: 0 0 10px #ff4d6d, 0 0 20px #ff4d6d;
      animation: glowText 2s infinite alternate;
    }

    @keyframes glowText {
      from {
        text-shadow: 0 0 10px #ff4d6d;
      }
      to {
        text-shadow: 0 0 20px #ff4d6d, 0 0 40px #ff4d6d;
      }
    }

    /* floating particles */
    .bubble {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #ff4d6d;
      border-radius: 50%;
      opacity: 0.7;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translateY(-800px) scale(0.5);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="heart"></div>
  <div class="text">I love Purvii ❤️</div>
</div>

<script>
  // create floating particles
  for (let i = 0; i < 30; i++) {
    let bubble = document.createElement("div");
    bubble.classList.add("bubble");

    bubble.style.left = Math.random() * 100 + "vw";
    bubble.style.animationDuration = (3 + Math.random() * 5) + "s";
    bubble.style.width = bubble.style.height = (5 + Math.random() * 10) + "px";

    document.body.appendChild(bubble);
  }
</script>

</body>
</html>
